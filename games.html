<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Robert Grinshtein</title>
    
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503401.png">

    <style>
        /* Навигационная панель */
        .top-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color); position: sticky;
            top: 0; z-index: 1000; flex-wrap: wrap;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-photo {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid transparent; transition: border-color 0.3s ease;
        }
        .nav-photo:hover { border-color: var(--accent); }
        .nav-name {
            font-family: var(--font-headers); font-size: 1.2rem;
            font-weight: bold; line-height: 1.1;
        }
        .nav-name a { color: var(--accent); text-decoration: none; }
        
        .nav-links-horizontal {
            list-style: none; display: flex; gap: 20px;
            margin: 0; padding: 0; align-items: center;
        }
        .nav-links-horizontal a { color: var(--text-dim); font-size: 1rem; text-decoration: none;}
        .nav-links-horizontal a:hover, .nav-links-horizontal a.active {
            color: var(--accent); font-weight: bold;
        }

        .btn-inline {
            background: transparent; border: 1px solid var(--text-dim);
            color: var(--text-main); padding: 6px 10px;
            border-radius: 5px; cursor: pointer; transition: all 0.2s;
            font-weight: bold;
        }
        .btn-inline:hover { border-color: var(--accent); color: var(--accent); }

        /* Контент страницы */
        .games-header {
            text-align: center; margin-top: 30px; margin-bottom: 10px;
            font-family: var(--font-headers);
        }
        .games-subtitle {
            text-align: center; color: var(--text-dim); margin-bottom: 40px;
        }

        .games-list {
            display: flex; flex-direction: column; gap: 20px;
            list-style: none; padding: 0; margin: 0;
        }
        
        /* Карточка игры */
        .game-card {
            padding: 25px; border: 1px solid var(--border-color);
            border-radius: 8px; background-color: var(--code-bg);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .game-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        .game-card h2 {
            margin-top: 0; margin-bottom: 10px; font-size: 1.5rem;
        }
        .game-card h2 a {
            color: var(--accent); text-decoration: none;
        }
        .game-card h2 a:hover { text-decoration: underline; }
        .game-card p {
            margin: 0; color: var(--text-main); line-height: 1.5;
        }

        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 15px; }
            .nav-links-horizontal { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    
    <header class="top-nav">
        <div class="nav-brand">
            <a href="index.html"><img src="pics/my_gif.gif" alt="Robert" class="nav-photo"></a>
            <div class="nav-name"><a href="index.html">Robert Grinshtein</a></div>
        </div>
        <ul class="nav-links-horizontal">
            <li><a href="index.html#about">About</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="games.html" class="active">Games</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="CV_2025.pdf">CV</a></li>
            <li><button class="btn-inline" id="theme-toggle"><i class="fas fa-sun"></i></button></li>
        </ul>
    </header>

    <div class="container" style="display: block; max-width: 800px; margin: 0 auto;">
        <main class="content" style="width: 100%;">
            
            <h1 class="games-header">Quantum Games</h1>
            <p class="games-subtitle">Collection of games, which works in browser.</p>
            
            <ul class="games-list">
                <li class="game-card">
                    <h2><a href="games/quant-ttt.html">Quantum Tic-Tac-Toe</a></h2>
                    <p>Tic-Tac-Toe with quantum mechanics rules: superposition and entanglement.</p>
                </li>
                </ul>

        </main>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
